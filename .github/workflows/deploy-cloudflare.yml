name: Deploy Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_API_BASE: https://kachuful-server.rdoshi13.workers.dev
      NEXT_PUBLIC_SOCKET_URL: https://kachuful-server.rdoshi13.workers.dev
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      - name: Run web tests
        run: pnpm --filter @kachuful/web test

      - name: Build web static output
        run: pnpm --filter @kachuful/web build

      - name: Deploy kachuful-server (API + web assets)
        run: >
          pnpm --filter @kachuful/cloudflare-server exec wrangler deploy
          --name kachuful-server
          --compatibility-date 2026-03-27
          --assets ../web/out
