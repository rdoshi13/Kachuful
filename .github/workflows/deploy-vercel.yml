name: Deploy Vercel Frontend

on:
  push:
    branches:
      - main
    paths:
      - apps/web/**
      - packages/shared-types/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/deploy-vercel.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run web tests
        run: pnpm --filter @kachuful/web test

      - name: Build and deploy frontend to Vercel
        run: |
          pnpm dlx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          pnpm dlx vercel build --prod --token="$VERCEL_TOKEN"
          pnpm dlx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
